apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - infra.yaml
  - services.yaml
  - ingress.yaml

# secrets.yaml создаётся вручную — не включать в kustomization
# kubectl apply -f k8s/staging/secrets.yaml  (только локально, не в git!)

images:
  - name: ghcr.io/kazmaker/pkt-platform/core-api
    newTag: latest
  - name: ghcr.io/kazmaker/pkt-platform/expertise-svc
    newTag: latest
  - name: ghcr.io/kazmaker/pkt-platform/sync-svc
    newTag: latest
  - name: ghcr.io/kazmaker/pkt-platform/assistant-svc
    newTag: latest
  - name: ghcr.io/kazmaker/pkt-platform/web
    newTag: latest
