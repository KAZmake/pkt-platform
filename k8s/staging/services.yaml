# ─── core-api ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: staging
  labels:
    app: core-api
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api
          image: ghcr.io/kazmaker/pkt-platform/core-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pkt-staging-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pkt-staging-secrets
                  key: POSTGRES_PASSWORD
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pkt-staging-secrets
                  key: VALKEY_PASSWORD
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pkt-staging-secrets
                  key: RESEND_API_KEY
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: staging
spec:
  selector:
    app: core-api
  ports:
    - port: 8080
      targetPort: 8080
---
