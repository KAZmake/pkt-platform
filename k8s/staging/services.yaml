# ─── web (Next.js) ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/kazmaker/pkt-platform/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: pkt-staging-config
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: pkt-staging-secrets
                  key: NEXTAUTH_SECRET
            - name: AUTH_KEYCLOAK_ID
              value: web
            - name: AUTH_KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: pkt-staging-secrets
                  key: AUTH_KEYCLOAK_SECRET
            - name: AUTH_KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: pkt-staging-config
                  key: AUTH_KEYCLOAK_ISSUER
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pkt-staging-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_SYNC_URL
              valueFrom:
                configMapKeyRef:
                  name: pkt-staging-config
                  key: NEXT_PUBLIC_SYNC_URL
            - name: NEXT_PUBLIC_ASSISTANT_URL
              valueFrom:
                configMapKeyRef:
                  name: pkt-staging-config
                  key: NEXT_PUBLIC_ASSISTANT_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 1000m
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: staging
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
