# ПРИМЕР — не коммитить с реальными значениями!
# Создай реальный secrets.yaml локально или используй sealed-secrets / external-secrets.
#
# Быстрое создание:
#   kubectl create secret generic pkt-staging-secrets -n staging \
#     --from-literal=POSTGRES_PASSWORD=... \
#     --from-literal=NEXTAUTH_SECRET=... \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: pkt-staging-secrets
  namespace: staging
type: Opaque
stringData:
  POSTGRES_PASSWORD: 'change_me'
  POSTGRES_USER: 'pkt'
  POSTGRES_DB: 'pkt_db'

  KEYCLOAK_DB_PASSWORD: 'change_me'
  KEYCLOAK_ADMIN_PASSWORD: 'change_me'

  VALKEY_PASSWORD: 'change_me'

  MINIO_ROOT_USER: 'minioadmin'
  MINIO_ROOT_PASSWORD: 'change_me'

  DIRECTUS_SECRET: 'change_me_long_random_string'
  DIRECTUS_DB_PASSWORD: 'change_me'
  DIRECTUS_ADMIN_PASSWORD: 'change_me'
  DIRECTUS_KEYCLOAK_SECRET: 'change_me'

  NEXTAUTH_SECRET: 'change_me_32_chars_minimum'
  AUTH_KEYCLOAK_SECRET: 'change_me'

  ANTHROPIC_API_KEY: 'sk-ant-...'

  ONEC_BASE_URL: 'http://1c-host/base/'
  ONEC_USERNAME: 'change_me'
  ONEC_PASSWORD: 'change_me'

  RESEND_API_KEY: 're_...'
---
# Backblaze B2 backup credentials
# kubectl create secret generic pkt-backup-secrets -n staging \
#   --from-literal=B2_ACCOUNT_ID=... \
#   --from-literal=B2_APPLICATION_KEY=... \
#   --from-literal=B2_BUCKET=pkt-staging-backups
apiVersion: v1
kind: Secret
metadata:
  name: pkt-backup-secrets
  namespace: staging
type: Opaque
stringData:
  B2_ACCOUNT_ID: 'change_me'
  B2_APPLICATION_KEY: 'change_me'
  B2_BUCKET: 'pkt-staging-backups'
