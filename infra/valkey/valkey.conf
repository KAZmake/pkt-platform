# Valkey 8 — конфигурация для PKT Platform (local dev)

port 6379
loglevel warning

# ─── Персистентность ──────────────────────────────────────────────────────────
# Сохранять снапшот если за 60 сек изменилась хотя бы 1 запись
save 60 1

# ─── Память ───────────────────────────────────────────────────────────────────
maxmemory 256mb

# volatile-lru: вытеснять ключи с TTL по LRU
# Сессии (без TTL) — не трогать, кэш (с TTL) — вытеснять первым
maxmemory-policy volatile-lru

# ─── Базы данных (логические) ─────────────────────────────────────────────────
# DB 0 — сессии     (session:*)
# DB 1 — кэш API    (cache:*)
# DB 2 — рейтлимит  (ratelimit:*)
# DB 3 — локи       (lock:*)
databases 4
