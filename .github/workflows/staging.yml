name: Staging Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all / web / core-api / expertise-svc / sync-svc / assistant-svc)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/pkt-platform

jobs:
  # ─── Lint & Test ─────────────────────────────────────────────────────────────
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.work
          cache-dependency-path: apps/api/go.work.sum
      - run: go build ./...
      - run: go test ./... -count=1 -timeout=120s

  test-web:
    name: Web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm type-check

  # ─── Build & Push Docker images ──────────────────────────────────────────────
  build-go:
    name: Build Go images
    needs: [test-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [core-api, expertise-svc, sync-svc, assistant-svc]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64

  build-web:
    name: Build Web image
    needs: [test-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_BUILD_STANDALONE=true

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging (k3s)
    needs: [build-go, build-web]
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace & config
        run: |
          kubectl apply -f k8s/staging/namespace.yaml
          kubectl apply -f k8s/staging/configmap.yaml

      - name: Update image tags
        run: |
          # Pin images to exact commit SHA for this deploy
          cd k8s/staging
          for svc in core-api expertise-svc sync-svc assistant-svc web; do
            kubectl set image deployment/$svc $svc=${{ env.IMAGE_PREFIX }}/$svc:${{ github.sha }} \
              -n staging --record 2>/dev/null || true
          done

      - name: Apply all manifests via kustomize
        run: kubectl apply -k k8s/staging/

      - name: Wait for rollout
        run: |
          for deploy in core-api expertise-svc sync-svc assistant-svc web; do
            kubectl rollout status deployment/$deploy -n staging --timeout=120s
          done

      - name: Smoke test
        run: |
          sleep 5
          kubectl run smoke-test --image=curlimages/curl:latest -n staging --restart=Never \
            --rm -it -- curl -sf http://web:3000/ -o /dev/null && echo "Web OK"
          kubectl run smoke-api --image=curlimages/curl:latest -n staging --restart=Never \
            --rm -it -- curl -sf http://core-api:8080/api/v1/health && echo "API OK"
